<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PathAI - 3-Page Learning Platform</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
  <style>
    :root {
      --bg-primary: #0a0f1e;
      --bg-secondary: #0f1628;
      --bg-tertiary: #161f3a;
      --bg-hover: #1e2a47;
      --text-primary: #e4e4e7;
      --text-secondary: #a1a1aa;
      --cyan: #22d3ee;
      --purple: #a78bfa;
      --green: #10b981;
      --border: #27354b;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
      background-color: var(--bg-primary);
      color: var(--text-primary);
    }

    .app {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* Navigation */
    .navbar {
      position: sticky;
      top: 0;
      z-index: 100;
      background-color: rgba(15, 22, 40, 0.9);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(10px);
      padding: 12px 20px;
    }

    .nav-container {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 30px;
    }

    .nav-logo {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--cyan);
      text-decoration: none;
    }

    .nav-tabs {
      display: flex;
      gap: 30px;
      flex: 1;
    }

    .nav-tab {
      text-decoration: none;
      color: var(--text-secondary);
      font-weight: 500;
      cursor: pointer;
      border: none;
      background: none;
      padding: 8px 0;
      font-size: 1rem;
      transition: color 0.3s;
    }

    .nav-tab.active {
      color: var(--cyan);
      border-bottom: 2px solid var(--cyan);
    }

    .nav-tab:hover {
      color: var(--cyan);
    }

    .nav-user {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .user-name {
      color: var(--text-primary);
      font-weight: 500;
    }

    .btn-logout {
      padding: 8px 20px;
      background-color: var(--bg-tertiary);
      border: 1px solid var(--border);
      color: var(--text-primary);
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn-logout:hover {
      background-color: var(--bg-hover);
      border-color: var(--cyan);
    }

    .btn-login {
      padding: 8px 20px;
      background: linear-gradient(135deg, var(--cyan), var(--purple));
      color: #0a0f1e;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn-login:hover {
      box-shadow: 0 0 20px rgba(34, 211, 238, 0.3);
    }

    /* Main Content */
    .main-content {
      flex: 1;
      max-width: 1400px;
      margin: 0 auto;
      width: 100%;
      padding: 40px 20px;
    }

    /* Dashboard */
    .dashboard-header h1 {
      background: linear-gradient(135deg, var(--cyan), var(--purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
      font-size: 2rem;
    }

    .dashboard-header p {
      color: var(--text-secondary);
      margin-bottom: 30px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }

    .stat-card {
      background: linear-gradient(135deg, var(--bg-secondary), var(--bg-tertiary));
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      transition: all 0.3s;
      cursor: pointer;
    }

    .stat-card:hover {
      border-color: var(--cyan);
      box-shadow: 0 0 30px rgba(34, 211, 238, 0.2);
      transform: translateY(-4px);
    }

    .stat-icon {
      font-size: 2.5rem;
    }

    .stat-value {
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--cyan);
      margin-bottom: 4px;
    }

    .stat-label {
      color: var(--text-secondary);
      font-size: 0.9rem;
    }

    /* Roadmap Page */
    .roadmap-page {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 0;
      height: calc(100vh - 60px);
    }

    .sidebar {
      background-color: var(--bg-secondary);
      border-right: 1px solid var(--border);
      padding: 20px 0;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .sidebar-header {
      padding: 0 16px 20px;
      border-bottom: 1px solid var(--border);
      color: var(--cyan);
      font-weight: 600;
    }

    .sidebar-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px 8px;
    }

    .sidebar-item {
      padding: 12px 16px;
      margin: 8px 0;
      background-color: transparent;
      border-left: 3px solid transparent;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
      user-select: none;
    }

    .sidebar-item:hover {
      background-color: var(--bg-tertiary);
      border-left-color: var(--purple);
    }

    .sidebar-item.active {
      background-color: var(--bg-tertiary);
      border-left-color: var(--cyan);
    }

    .roadmap-title {
      color: var(--text-primary);
      font-weight: 500;
      font-size: 0.95rem;
      margin-bottom: 6px;
    }

    .roadmap-meta-small {
      color: var(--text-secondary);
      font-size: 0.8rem;
      display: flex;
      justify-content: space-between;
    }

    .roadmap-content {
      flex: 1;
      overflow-y: auto;
      padding: 40px;
    }

    .day-section {
      background: linear-gradient(135deg, var(--bg-secondary), var(--bg-tertiary));
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 16px;
    }

    .day-header {
      color: var(--cyan);
      margin-bottom: 16px;
      font-weight: 600;
    }

    .content-line {
      color: var(--text-secondary);
      line-height: 1.6;
      margin-bottom: 8px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }

    .stat-card {
      background: linear-gradient(135deg, var(--bg-secondary), var(--bg-tertiary));
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      transition: all 0.3s;
    }

    .stat-card:hover {
      border-color: var(--cyan);
      box-shadow: 0 0 30px rgba(34, 211, 238, 0.2);
      transform: translateY(-4px);
    }

    .stat-icon {
      font-size: 2.5rem;
    }

    .stat-value {
      font-size: 2rem;
      font-weight: 700;
      color: var(--cyan);
    }

    .stat-label {
      color: var(--text-secondary);
      font-size: 0.9rem;
    }

    .dashboard-header {
      margin-bottom: 40px;
    }

    .dashboard-header h1 {
      color: var(--cyan);
      font-size: 2.5rem;
      margin-bottom: 8px;
    }

    .dashboard-header p {
      color: var(--text-secondary);
      font-size: 1.1rem;
    }

    /* Progress Page */
    .analytics-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }

    .analytics-card {
      background: linear-gradient(135deg, var(--bg-secondary), var(--bg-tertiary));
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      transition: all 0.3s;
    }

    .analytics-card:hover {
      border-color: var(--purple);
      box-shadow: 0 0 30px rgba(167, 139, 250, 0.2);
      transform: translateY(-4px);
    }

    .card-icon {
      font-size: 2.5rem;
    }

    .card-value {
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--purple);
      margin-bottom: 4px;
    }

    .card-label {
      color: var(--text-secondary);
      font-size: 0.9rem;
    }

    /* Activity Chart */
    .activity-section {
      background: linear-gradient(135deg, var(--bg-secondary), var(--bg-tertiary));
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 32px;
      margin-bottom: 40px;
    }

    .activity-section h2 {
      color: var(--cyan);
      margin-bottom: 24px;
      font-size: 1.5rem;
    }

    .chart-container {
      display: flex;
      align-items: flex-end;
      justify-content: space-around;
      height: 200px;
      gap: 16px;
      padding: 24px 0;
    }

    .chart-bar-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1;
      max-width: 80px;
      gap: 12px;
    }

    .chart-bar {
      width: 100%;
      max-width: 60px;
      background: linear-gradient(180deg, var(--cyan), var(--purple));
      border-radius: 6px 6px 0 0;
      transition: all 0.3s;
      cursor: pointer;
      min-height: 20px;
    }

    .chart-bar:hover {
      box-shadow: 0 0 20px rgba(34, 211, 238, 0.4);
      transform: scaleY(1.05);
    }

    .chart-label {
      color: var(--text-secondary);
      font-size: 0.85rem;
      font-weight: 500;
    }

    .chart-value {
      color: var(--cyan);
      font-weight: 600;
      font-size: 0.9rem;
    }

    /* Badges */
    .achievements-section {
      background: linear-gradient(135deg, var(--bg-secondary), var(--bg-tertiary));
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 32px;
      margin-bottom: 40px;
    }

    .achievements-section h2 {
      color: var(--purple);
      margin-bottom: 24px;
      font-size: 1.5rem;
    }

    .badges-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 20px;
    }

    .badge {
      background: linear-gradient(135deg, var(--bg-secondary), var(--bg-tertiary));
      border: 2px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      transition: all 0.3s;
      cursor: pointer;
      min-height: 160px;
      justify-content: center;
      position: relative;
    }

    .badge:hover {
      border-color: var(--purple);
      transform: translateY(-8px);
    }

    .badge.unlocked {
      border-color: var(--cyan);
      background: linear-gradient(135deg, rgba(34, 211, 238, 0.1), rgba(167, 139, 250, 0.1));
    }

    .badge.unlocked:hover {
      box-shadow: 0 0 30px rgba(34, 211, 238, 0.3);
    }

    .badge.locked {
      opacity: 0.6;
    }

    .badge-icon {
      font-size: 3rem;
      margin-bottom: 12px;
    }

    .badge-name {
      color: var(--text-primary);
      font-weight: 600;
      font-size: 0.95rem;
      margin-bottom: 8px;
    }

    .badge.unlocked .badge-name {
      color: var(--cyan);
    }

    .badge-lock {
      position: absolute;
      top: 8px;
      right: 8px;
      font-size: 1.2rem;
    }

    /* Misc */
    h2, h3 {
      margin-bottom: 16px;
    }

    button {
      cursor: pointer;
      border: none;
      border-radius: 6px;
      font-weight: 500;
      transition: all 0.3s;
      font-size: 1rem;
    }

    .btn-login {
      background: linear-gradient(135deg, var(--cyan), var(--purple));
      color: #0a0f1e;
      padding: 8px 16px;
      font-weight: 700;
    }

    .btn-logout {
      background: #ef4444;
      color: white;
      padding: 8px 16px;
      font-weight: 600;
    }

    .user-name {
      color: var(--text-secondary);
    }

    input, select {
      padding: 12px;
      background-color: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-primary);
      font-size: 1rem;
    }

    input:focus, select:focus {
      outline: none;
      border-color: var(--cyan);
      box-shadow: 0 0 0 3px rgba(34, 211, 238, 0.1);
    }

    .doubt-section {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      padding: 24px;
      border-radius: 12px;
      margin-top: 40px;
    }

    .doubt-form {
      display: flex;
      gap: 12px;
      margin-top: 16px;
    }

    .doubt-form input {
      flex: 1;
      padding: 12px 16px;
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-primary);
      font-size: 14px;
    }

    .doubt-form input::placeholder {
      color: var(--text-secondary);
    }

    .doubt-form button {
      padding: 12px 24px;
      background: linear-gradient(135deg, var(--purple), var(--cyan));
      color: #0a0f1e;
      font-weight: 600;
    }

    .doubt-form button:hover:not(:disabled) {
      transform: translateY(-2px);
    }

    .doubt-form button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .doubt-answer {
      background: var(--bg-primary);
      border-left: 4px solid var(--cyan);
      padding: 16px;
      border-radius: 8px;
      margin-top: 16px;
      color: var(--text-secondary);
      line-height: 1.6;
      font-size: 14px;
    }

    .task-checkbox {
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--text-secondary);
      cursor: pointer;
      margin-top: 16px;
      padding: 12px;
      background: var(--bg-primary);
      border-radius: 6px;
      border: 1px solid var(--border);
    }

    .task-checkbox input {
      cursor: pointer;
      width: 18px;
      height: 18px;
      accent-color: var(--cyan);
    }

    .task-checkbox:hover {
      background: var(--bg-tertiary);
    }

    @media (max-width: 768px) {
      .roadmap-page {
        grid-template-columns: 1fr;
      }
      .sidebar { display: none; }
      .nav-tabs { gap: 16px; font-size: 0.9rem; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }

    @keyframes slideIn {
      from { 
        opacity: 0; 
        transform: translateX(-20px); 
      }
      to { 
        opacity: 1; 
        transform: translateX(0); 
      }
    }

    .fade-in { animation: fadeIn 0.3s ease-out; }
    .pulse { animation: pulse 1s ease-in-out infinite; }
    .slide-in { animation: slideIn 0.5s ease-out; }
  </style>
</head>
<body>
  <div id="root">
    <div style="display: flex; align-items: center; justify-content: center; height: 100vh; font-family: Arial; color: #e4e4e7; background: #0a0f1e; flex-direction: column; gap: 20px;">
      <div style="font-size: 48px;">⏳</div>
      <h1>Loading PathAI...</h1>
      <p style="color: #a1a1aa;">If this page looks stuck, open DevTools (F12) to check for errors</p>
    </div>
  </div>

  <script type="text/babel">
    console.log('✅ React App Starting...');
    console.log('React:', typeof React);
    console.log('ReactDOM:', typeof ReactDOM);
    
    const { useState, useEffect } = React;

    function App() {
      const [currentPage, setCurrentPage] = useState('dashboard');
      const [user, setUser] = useState(null);
      const [roadmaps, setRoadmaps] = useState([]);
      const [showAuth, setShowAuth] = useState(false);
      const [authMode, setAuthMode] = useState('login');
      const [refreshTrigger, setRefreshTrigger] = useState(0);
      const [selectedRoadmapId, setSelectedRoadmapId] = useState(null);
      const BACKEND_URL = 'http://localhost:5000';

      useEffect(() => {
        const token = localStorage.getItem('authToken');
        if (token) loadUserProfile(token);
      }, []);

      useEffect(() => {
        if (user) {
          const token = localStorage.getItem('authToken');
          loadRoadmaps(token);
        }
      }, [user, refreshTrigger]);

      const loadUserProfile = async (token) => {
        try {
          const res = await fetch(`${BACKEND_URL}/api/auth/me`, {
            headers: { 'Authorization': `Bearer ${token}` }
          });
          if (res.ok) {
            const userData = await res.json();
            setUser(userData);
          } else {
            localStorage.removeItem('authToken');
          }
        } catch (err) {
          console.error('Profile load failed:', err);
          localStorage.removeItem('authToken');
        }
      };

      const loadRoadmaps = async (token) => {
        try {
          console.log('[App] Loading roadmaps...');
          const res = await fetch(`${BACKEND_URL}/api/roadmap`, {
            headers: { 'Authorization': `Bearer ${token}` }
          });
          if (res.ok) {
            const data = await res.json();
            console.log('[App] Roadmaps received from backend:', data);
            setRoadmaps(data.roadmaps || []);
            console.log('[App] State updated with', (data.roadmaps || []).length, 'roadmaps');
          } else {
            console.error('[App] Failed to fetch roadmaps. Status:', res.status);
          }
        } catch (err) {
          console.error('[App] Roadmaps load failed:', err);
        }
      };

      const refreshRoadmaps = () => {
        setRefreshTrigger(t => t + 1);
      };

      return (
        <div className="app">
          <Navigation 
            user={user} 
            currentPage={currentPage}
            onPageChange={setCurrentPage}
            onLogout={() => { 
              setUser(null); 
              setRoadmaps([]); 
              localStorage.removeItem('authToken');
              setCurrentPage('dashboard');
            }}
            onLoginClick={() => setShowAuth(true)}
          />
          <div className="main-content">
            {!user ? (
              <AuthForm 
                mode={authMode}
                onModeChange={setAuthMode}
                onSuccess={(user, token) => {
                  setUser(user);
                  localStorage.setItem('authToken', token);
                  setShowAuth(false);
                  loadRoadmaps(token);
                }}
                backendUrl={BACKEND_URL}
              />
            ) : (
              <>
                {currentPage === 'dashboard' && <Dashboard user={user} roadmaps={roadmaps} onRefresh={refreshRoadmaps} onViewRoadmap={(roadmapId) => { setSelectedRoadmapId(roadmapId); setCurrentPage('roadmap'); }} onDeleteRoadmap={(roadmapId) => { const token = localStorage.getItem('authToken'); fetch(`${BACKEND_URL}/api/roadmap/${roadmapId}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` } }).then(r => r.ok && (setRoadmaps(roadmaps.filter(r => r.id !== roadmapId)), console.log('[Dashboard] Roadmap deleted'))) }} />}
                {currentPage === 'roadmap' && <RoadmapPage roadmaps={roadmaps} onRefresh={refreshRoadmaps} initialRoadmapId={selectedRoadmapId} onPageChange={setCurrentPage} />}
                {currentPage === 'progress' && <ProgressPage user={user} roadmaps={roadmaps} />}
              </>
            )}
          </div>
        </div>
      );
    }

    function AuthForm({ mode, onModeChange, onSuccess, backendUrl }) {
      const [email, setEmail] = useState('demo@pathai.com');
      const [password, setPassword] = useState('demo123');
      const [name, setName] = useState('');
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState('');

      const handleSubmit = async (e) => {
        e.preventDefault();
        setError('');

        if (!email.trim() || !password.trim()) {
          setError('Please enter email and password');
          return;
        }

        if (mode === 'signup' && !name.trim()) {
          setError('Please enter your name');
          return;
        }

        setLoading(true);
        try {
          const endpoint = mode === 'login' ? '/api/auth/login' : '/api/auth/signup';
          const payload = mode === 'login' 
            ? { email, password }
            : { name, email, password };

          const res = await fetch(`${backendUrl}${endpoint}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });

          if (!res.ok) {
            const text = await res.text();
            try {
              const data = JSON.parse(text);
              setError(data.message || data.error || 'Authentication failed');
            } catch {
              setError('Server error: ' + text.substring(0, 100));
            }
            return;
          }

          const data = await res.json();
          onSuccess(data.user, data.token);
        } catch (err) {
          setError('Error: ' + err.message);
        } finally {
          setLoading(false);
        }
      };

      return (
        <div style={{
          display: 'flex',
          alignItems: 'center',
          justifyContent: 'center',
          minHeight: 'calc(100vh - 60px)',
          background: 'linear-gradient(135deg, var(--bg-primary), var(--bg-secondary))',
          padding: '20px'
        }}>
          <div style={{
            background: 'var(--bg-secondary)',
            border: '1px solid var(--border)',
            borderRadius: '16px',
            padding: '40px',
            maxWidth: '400px',
            width: '100%'
          }}>
            <h1 style={{ color: 'var(--cyan)', marginBottom: '8px', textAlign: 'center' }}>🤖 PathAI</h1>
            <p style={{ color: 'var(--text-secondary)', textAlign: 'center', marginBottom: '32px' }}>
              Your learning path generator
            </p>

            <form onSubmit={handleSubmit}>
              {mode === 'signup' && (
                <div style={{ marginBottom: '16px' }}>
                  <label style={{ color: 'var(--text-secondary)', fontSize: '0.9rem', marginBottom: '8px', display: 'block' }}>Name</label>
                  <input
                    type="text"
                    value={name}
                    onChange={(e) => setName(e.target.value)}
                    placeholder="Your name"
                    disabled={loading}
                    style={{ width: '100%' }}
                  />
                </div>
              )}

              <div style={{ marginBottom: '16px' }}>

Q3: Question?|||Option A|||Option B|||Option C - CORRECT|||Option D

      const weeklyData = [
        { day: 'Mon', hours: 2 },
        { day: 'Tue', hours: 3 },
        { day: 'Wed', hours: 1 },
        { day: 'Thu', hours: 4 },
        { day: 'Fri', hours: 2 },
        { day: 'Sat', hours: 3 },
        { day: 'Sun', hours: 2 }
      ];
      const maxHours = 4;

      const achievements = [
        { id: 1, name: 'Quick Learner', icon: '⚡', unlocked: true },
        { id: 2, name: '7-Day Streak', icon: '🔥', unlocked: user?.streak >= 7 },
        { id: 3, name: 'First Roadmap', icon: '🚀', unlocked: roadmaps.length > 0 },
        { id: 4, name: 'Master', icon: '👑', unlocked: roadmaps.filter(r => r.status === 'completed').length >= 5 },
        { id: 5, name: 'Social Butterfly', icon: '🦋', unlocked: user?.level >= 5 },
        { id: 6, name: 'XP Collector', icon: '💎', unlocked: user?.xp >= 1000 }
      ];

      return (
        <div className="fade-in">
          <h1 style={{ color: 'var(--cyan)', marginBottom: '8px' }}>📈 Your Learning Progress</h1>
          <p style={{ color: 'var(--text-secondary)', marginBottom: '30px' }}>Track your achievements and learning trends</p>

          <div className="analytics-grid">
            <div className="analytics-card">
              <div className="card-icon">📅</div>
              <div>
                <div className="card-value">{totalDays}</div>
                <div className="card-label">Total Learning Days</div>
              </div>
            </div>
            <div className="analytics-card">
              <div className="card-icon">✅</div>
              <div>
                <div className="card-value">{Math.floor(totalDays * 0.4)}</div>
                <div className="card-label">Days Completed</div>
              </div>
            </div>
            <div className="analytics-card">
              <div className="card-icon">⭐</div>
              <div>
                <div className="card-value">{user?.level || 1}</div>
                <div className="card-label">Current Level</div>
              </div>
            </div>
            <div className="analytics-card">
              <div className="card-icon">🔥</div>
              <div>
                <div className="card-value">{user?.streak || 0}</div>
                <div className="card-label">Day Streak</div>
              </div>
            </div>
            <div className="analytics-card">
              <div className="card-icon">💫</div>
              <div>
                <div className="card-value">{user?.xp || 0}</div>
                <div className="card-label">Total XP</div>
              </div>
            </div>
            <div className="analytics-card">
              <div className="card-icon">🎯</div>
              <div>
                <div className="card-value">{roadmaps.filter(r => r.status === 'completed').length}</div>
                <div className="card-label">Completed Roadmaps</div>
              </div>
            </div>
          </div>

          <div className="activity-section">
            <h2>📊 Weekly Activity</h2>
            <div className="chart-container">
              {weeklyData.map((item, i) => {
                const height = (item.hours / maxHours) * 100;
                return (
                  <div key={i} className="chart-bar-group">
                    <div style={{
                      height: '180px',
                      display: 'flex',
                      alignItems: 'flex-end',
                      justifyContent: 'center',
                      width: '100%'
                    }}>
                      <div
                        className="chart-bar"
                        style={{
                          height: `${Math.max(height, 20)}px`,
                          opacity: 0.6 + (height / 100) * 0.4
                        }}
                      ></div>
                    </div>
                    <div className="chart-label">{item.day}</div>
                    <div className="chart-value">{item.hours}h</div>
                  </div>
                );
              })}
            </div>
          </div>

          <div className="achievements-section">
            <h2>🏆 Achievements</h2>
            <div className="badges-container">
              {achievements.map(badge => (
                <div key={badge.id} className={`badge ${badge.unlocked ? 'unlocked' : 'locked'}`}>
                  <div className="badge-icon">{badge.icon}</div>
                  <div className="badge-name">{badge.name}</div>
                  {!badge.unlocked && <div className="badge-lock">🔒</div>}
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    console.log('✅ React App Rendered Successfully!');
  </script>

</body>
</html>
